- name: Check if nvidia-drm.modeset=1 is already in GRUB_CMDLINE_LINUX
  shell: grep -q "nvidia-drm.modeset=1" /etc/default/grub
  register: grub_check
  ignore_errors: true
  failed_when: false

- name: Add nvidia-drm.modeset=1 to GRUB_CMDLINE_LINUX
  replace:
    path: /etc/default/grub
    regexp: '^(GRUB_CMDLINE_LINUX="[^"]*)"'
    replace: '\1 nvidia-drm.modeset=1"'
  become: true
  when: grub_check.rc != 0

- name: Detect GRUB config file path (RedHat)
  shell: |
    find /boot/efi/EFI -name grub.cfg -maxdepth 2 2>/dev/null | head -1 || echo "/boot/grub2/grub.cfg"
  register: grub_cfg_path_result
  changed_when: false
  become: true
  when: grub_check.rc != 0 and ansible_os_family == "RedHat"

- name: Update GRUB configuration (RedHat)
  shell: grub2-mkconfig -o {{ grub_cfg_path_result.stdout | trim }}
  become: true
  args:
    executable: /bin/bash
  when: grub_check.rc != 0 and ansible_os_family == "RedHat"
  register: grub_update_result_redhat

- name: Update GRUB configuration (Debian)
  shell: update-grub
  become: true
  args:
    executable: /bin/bash
  when: grub_check.rc != 0 and ansible_os_family == "Debian"
  register: grub_update_result_debian

- name: Reboot system after grub update
  reboot:
    msg: "Reboot initiated by Ansible after adding nvidia-drm.modeset=1 and updating grub"
    connect_timeout: 5
    reboot_timeout: 600
    pre_reboot_delay: 0
    post_reboot_delay: 30
    test_command: whoami
  become: true
  when: grub_check.rc != 0
